name: CI - Zero Trust IAM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpass
  POSTGRES_DB: testdb
  POSTGRES_HOST: localhost
  KEYCLOAK_URL: http://localhost:8080
  RISK_ENGINE_URL: http://localhost:8001
  POLICY_ENGINE_SECRET_KEY: testsecretkey32charslongfortesting
  KEYCLOAK_REALM: zero-trust-demo
  KEYCLOAK_CLIENT_ID: policy-engine
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin

jobs:
  test-policy-engine:
    name: Policy engine tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r policy-engine/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run unit tests
        run: PYTHONPATH=policy-engine pytest tests/unit/test_policy_evaluator.py -v
      - name: Run attack simulations
        run: PYTHONPATH=policy-engine pytest tests/attacks -v --tb=short

  test-risk-engine:
    name: Risk engine tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install all deps
        run: |
          pip install -r risk-engine/requirements.txt
          pip install -r policy-engine/requirements.txt
          pip install pytest
      - name: Run risk engine tests
        run: PYTHONPATH=risk-engine pytest tests/unit/test_risk_scorer.py -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check policy-engine/app risk-engine/app --ignore=E501 || true

  docker-build:
    name: Docker build check
    runs-on: ubuntu-22.04
    needs: [test-policy-engine, test-risk-engine]
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker build ./policy-engine -t zt-policy-engine:ci
      - run: docker build ./risk-engine -t zt-risk-engine:ci
