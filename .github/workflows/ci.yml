name: CI — Zero Trust IAM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-policy-engine:
    name: Policy engine tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r policy-engine/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        run: PYTHONPATH=policy-engine pytest tests/unit/test_policy_evaluator.py -v

      - name: Run attack simulations
        run: PYTHONPATH=policy-engine pytest tests/attacks -v --tb=short

      - name: Run with coverage
        run: |
          PYTHONPATH=policy-engine pytest tests/unit/test_policy_evaluator.py tests/attacks \
            --cov=app --cov-report=term-missing -q

  test-risk-engine:
    name: Risk engine tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install risk engine deps
        run: |
          pip install -r risk-engine/requirements.txt
          pip install pytest

      - name: Run risk engine unit tests
        run: PYTHONPATH=risk-engine pytest tests/unit/test_risk_scorer.py -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check policy-engine/app risk-engine/app --ignore=E501 || true

  docker-build:
    name: Docker build check
    runs-on: ubuntu-22.04
    needs: [test-policy-engine, test-risk-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build policy-engine image
        run: docker build ./policy-engine -t zt-policy-engine:ci

      - name: Build risk-engine image
        run: docker build ./risk-engine -t zt-risk-engine:ci
